; Production PHP settings for NexusOS (E4: no stack traces / leaked errors).

; Never render errors/stack traces to the HTTP response.
display_errors = Off
display_startup_errors = Off

; Log errors to php-fpm's error log instead (visible via `docker compose logs php`).
log_errors = On

; Don't advertise PHP via the X-Powered-By header.
expose_php = Off

; Report everything except deprecations/strict notices to the log.
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
