# --- HTTP server: redirect everything to HTTPS (E1) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    server_tokens off;

    # Force every plain-HTTP request onto HTTPS.
    return 301 https://$host$request_uri;
}

# --- HTTPS server: serves the app (E1) ---
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    server_tokens off;

    # Self-signed certificate generated at image build time (see docker/nginx/Dockerfile).
    ssl_certificate     /etc/nginx/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /app/;
    index index.php;

    # Security response headers (nice-to-have).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS — only meaningful on the HTTPS server.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Let PHP know the original request arrived over HTTPS.
        fastcgi_param HTTPS on;
    }
}
