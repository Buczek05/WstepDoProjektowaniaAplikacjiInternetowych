# Serves the app over BOTH plain HTTP (dev) and HTTPS — no forced redirect.
# HTTPS stays available, but local dev can use plain http://localhost:8080.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    server_tokens off;

    # Self-signed certificate generated at image build time (see docker/nginx/Dockerfile).
    ssl_certificate     /etc/nginx/certs/nginx-selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /app/;
    index index.php;

    # Security response headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Per-request: 'on' for TLS, '' for plain HTTP — so the Secure cookie
        # flag is only set over HTTPS and login still works over plain HTTP.
        fastcgi_param HTTPS $https;
    }
}
