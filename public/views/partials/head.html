// Cache-busting: append the file's mtime so browsers always fetch fresh assets.
if (!function_exists('nx_asset')) {
    function nx_asset(string $rel): string {
        $abs = __DIR__ . '/../../../' . $rel;
        return $rel . '?v=' . (is_file($abs) ? filemtime($abs) : '1');
    }
}
