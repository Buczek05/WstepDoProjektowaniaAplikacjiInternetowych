<?php
// Shared NexusOS top bar + primary navigation.
// Expects (from the view scope): $active, $workspace, $userEmail.
$active   = $active ?? '';
$navItems = [
    'dashboard' => ['Dashboard', 'fa-gauge-high'],
    'sales'     => ['Sales',     'fa-chart-line'],
    'marketing' => ['Marketing', 'fa-bullhorn'],
    'global'    => ['Global',    'fa-earth-americas'],
    'settings'  => ['Settings',  'fa-gear'],
];
?>
<header class="nx-topbar">
  <div class="nx-brand">
    <span class="nx-logo">N</span>
    <div>
      <strong>Nexus<span>OS</span></strong>
      <small>Centralized Sales</small>
    </div>
  </div>

  <nav class="nx-nav">
    <?php foreach ($navItems as $key => [$label, $icon]): ?>
      <a href="/<?= $key ?>" class="<?= $active === $key ? 'is-active' : '' ?>">
        <i class="fa-solid <?= $icon ?>"></i> <?= htmlspecialchars($label, ENT_QUOTES, 'UTF-8') ?>
      </a>
    <?php endforeach; ?>
  </nav>

  <div class="nx-user">
    <?php if (!empty($workspace)): ?>
      <span class="nx-ws-name"><?= htmlspecialchars($workspace['name'], ENT_QUOTES, 'UTF-8') ?></span>
      <span class="nx-ws-plan"><?= htmlspecialchars($workspace['plan'], ENT_QUOTES, 'UTF-8') ?></span>
    <?php endif; ?>
    <span class="nx-email"><?= htmlspecialchars($userEmail ?? '', ENT_QUOTES, 'UTF-8') ?></span>
    <a class="nx-logout" href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
  </div>
</header>
